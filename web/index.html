<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Plant Monitoring Dashboard 🌿</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
  </style>
</head>

<body class="text-slate-100 min-h-screen flex flex-col py-10 px-4">

  <!-- Header -->
  <header class="text-center mb-10">
    <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500 flex items-center justify-center gap-2">
      Multi-Plant Monitoring 🌿
    </h1>
    <p class="text-slate-400 mt-2 text-lg">Dashboard Pemantauan & Manajemen Tanaman Real-time</p>
  </header>

  <!-- Main Container -->
  <main class="w-full max-w-6xl mx-auto flex flex-col gap-8 flex-grow">
    
    <!-- Top Action Bar -->
    <div class="flex justify-between items-center bg-slate-800/50 backdrop-blur border border-slate-700/50 p-4 rounded-2xl shadow-lg">
      <h2 class="text-xl font-semibold text-slate-300">Daftar Tanaman</h2>
      <button onclick="openModal('add')" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-2.5 px-5 rounded-xl transition-all shadow-md hover:shadow-emerald-500/20 active:scale-95">
        + Tambah Tanaman
      </button>
    </div>

    <!-- Plant Cards Grid -->
    <div id="plant-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Loading State -->
      <div class="col-span-full text-center py-10 text-slate-400">
        <div class="animate-pulse text-lg">Memuat data tanaman...</div>
      </div>
    </div>

  </main>

  <!-- Modal Form (Add/Edit Plant) -->
  <div id="plant-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md p-6 shadow-2xl m-4 transform scale-95 transition-transform duration-300">
      <div class="flex justify-between items-center mb-6">
        <h3 id="modal-title" class="text-xl font-bold text-slate-200">Tambah Tanaman Baru</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-200 text-2xl font-bold">&times;</button>
      </div>
      <form id="modal-form" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="modal-mode" value="add">
        
        <div class="mb-4">
          <label class="block text-slate-400 text-sm font-semibold mb-2" for="plant-id">ID Tanaman (misal: tanaman_001)</label>
          <input type="text" id="plant-id" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors">
        </div>

        <div class="mb-4">
          <label class="block text-slate-400 text-sm font-semibold mb-2" for="device-id">ID Perangkat ESP32 (misal: esp32_sensor_01)</label>
          <input type="text" id="device-id" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors" placeholder="esp32_sensor_01">
        </div>

        <div class="mb-4">
          <label class="block text-slate-400 text-sm font-semibold mb-2" for="plant-name">Nama Tanaman</label>
          <input type="text" id="plant-name" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors">
        </div>

        <div class="mb-4">
          <label class="block text-slate-400 text-sm font-semibold mb-2" for="plant-desc">Deskripsi</label>
          <textarea id="plant-desc" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors"></textarea>
        </div>

        <div class="mb-6">
          <label class="block text-slate-400 text-sm font-semibold mb-2" for="plant-benchmark">Benchmark Gas Sehat (Ohm)</label>
          <input type="number" id="plant-benchmark" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors" placeholder="100000">
        </div>

        <div class="flex justify-end gap-3">
          <button type="button" onclick="closeModal()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2 px-5 rounded-xl transition-colors">Batal</button>
          <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2 px-5 rounded-xl transition-colors shadow-md shadow-emerald-500/10">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-auto pt-10 text-slate-500 text-xs text-center">
    © 2026 Multi-Plant Monitoring System. All rights reserved.
  </footer>

  <!-- Firebase JavaScript SDK v8 (compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Firebase Configuration (Gunakan konfigurasi Anda)
    const firebaseConfig = {
      apiKey: "AIzaSyB23z9NoFYa_8knhe-smababbwyBKsb8Cc",
      authDomain: "bme688-tanaman.firebaseapp.com",
      databaseURL: "https://bme688-tanaman-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bme688-tanaman",
      storageBucket: "bme688-tanaman.firebasestorage.app",
      messagingSenderId: "277698092967",
      appId: "1:277698092967:web:e9955d2143fb4ffb662082"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DOM Elements
    const plantGrid = document.getElementById('plant-grid');
    const plantModal = document.getElementById('plant-modal');
    const modalForm = document.getElementById('modal-form');
    const modalTitle = document.getElementById('modal-title');
    const modalModeInput = document.getElementById('modal-mode');
    const plantIdInput = document.getElementById('plant-id');
    const deviceIdInput = document.getElementById('device-id');
    const plantNameInput = document.getElementById('plant-name');
    const plantDescInput = document.getElementById('plant-desc');
    const plantBenchmarkInput = document.getElementById('plant-benchmark');

    // Real-time Database Listener
    db.ref('/tanaman_list').on('value', (snapshot) => {
      const data = snapshot.val();
      renderPlantCards(data);
    }, (error) => {
      console.error("Gagal membaca database Firebase:", error);
      plantGrid.innerHTML = `<div class="col-span-full text-center py-10 text-rose-400">Gagal memuat data: ${error.message}</div>`;
    });

    // Render cards
    function renderPlantCards(plants) {
      if (!plants) {
        plantGrid.innerHTML = `
          <div class="col-span-full text-center py-10 text-slate-400">
            <p class="text-lg mb-2">Belum ada tanaman terdaftar.</p>
            <p class="text-sm">Klik tombol "+ Tambah Tanaman" untuk menambahkan.</p>
          </div>
        `;
        return;
      }

      let htmlContent = '';
      Object.keys(plants).forEach((id) => {
        const p = plants[id];
        const latest = p.data_terakhir || {};
        const isActive = p.status_sensor_aktif === 1;
        const benchmark = parseFloat(p.benchmark_gas) || 100000;
        const gas = latest.gas_resistance !== undefined ? parseFloat(latest.gas_resistance) : -1;
        const deviceId = p.device_id || 'esp32_sensor_01';

        // Tentukan status kesehatan
        let healthBadge = '';
        if (!isActive) {
          healthBadge = '<span class="px-2.5 py-1 text-xs font-bold bg-slate-700/60 text-slate-400 rounded-full">💤 Sensor Mati</span>';
        } else if (gas === -1) {
          healthBadge = '<span class="px-2.5 py-1 text-xs font-bold bg-amber-500/20 text-amber-400 rounded-full">⚡ Warming Up</span>';
        } else if (gas >= benchmark) {
          healthBadge = '<span class="px-2.5 py-1 text-xs font-bold bg-emerald-500/20 text-emerald-400 rounded-full">🌿 Sehat</span>';
        } else {
          healthBadge = '<span class="px-2.5 py-1 text-xs font-bold bg-rose-500/20 text-rose-400 rounded-full">⚠️ Sakit / Stres</span>';
        }

        // Tampilkan nilai sensor
        const tempText = latest.temperatur !== undefined ? `${parseFloat(latest.temperatur).toFixed(1)}°C` : '--';
        const humText = latest.kelembapan !== undefined ? `${parseFloat(latest.kelembapan).toFixed(1)}%` : '--';
        const gasText = gas >= 0 ? `${gas.toLocaleString('id-ID')} Ω` : '--';

        htmlContent += `
          <div class="bg-slate-800/80 backdrop-blur border border-slate-700/50 rounded-2xl p-6 shadow-xl flex flex-col justify-between transition hover:scale-[1.01] duration-300">
            <div>
              <div class="flex justify-between items-start gap-2 mb-2">
                <div>
                  <h3 class="text-lg font-bold text-slate-100">${p.nama}</h3>
                  <div class="flex flex-col gap-0.5 mt-0.5">
                    <span class="text-[10px] text-slate-500 font-mono">Plant ID: ${id}</span>
                    <span class="text-[10px] text-slate-500 font-mono">Device ID: ${deviceId}</span>
                  </div>
                </div>
                ${healthBadge}
              </div>
              <p class="text-slate-400 text-sm mb-4 line-clamp-2">${p.deskripsi || 'Tidak ada deskripsi.'}</p>
              
              <!-- Sensor readings grid -->
              <div class="grid grid-cols-3 gap-2 py-3 border-y border-slate-700/50 my-4 text-center">
                <div>
                  <span class="block text-[10px] text-slate-500 uppercase tracking-wider">Suhu</span>
                  <span class="text-sm font-semibold text-red-400">${tempText}</span>
                </div>
                <div>
                  <span class="block text-[10px] text-slate-500 uppercase tracking-wider">Lembap</span>
                  <span class="text-sm font-semibold text-blue-400">${humText}</span>
                </div>
                <div>
                  <span class="block text-[10px] text-slate-500 uppercase tracking-wider">Gas</span>
                  <span class="text-sm font-semibold text-emerald-400 truncate block px-1">${gasText}</span>
                </div>
              </div>
              
              <div class="flex justify-between items-center text-xs text-slate-400 mb-6">
                <span>Benchmark Gas: <strong class="text-slate-300">${benchmark.toLocaleString('id-ID')} Ω</strong></span>
              </div>
            </div>

            <!-- Actions footer -->
            <div class="flex justify-between items-center mt-auto pt-2">
              <!-- Sensor Active Toggle Switch -->
              <div class="flex items-center gap-2">
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleSensor('${id}', this.checked, '${deviceId}')" class="sr-only peer">
                  <div class="w-10 h-5.5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                </label>
                <span class="text-xs text-slate-400 font-semibold">${isActive ? 'Aktif' : 'Mati'}</span>
              </div>

              <!-- Edit & Delete Buttons -->
              <div class="flex gap-2">
                <button onclick="editPlant('${id}', '${p.nama}', '${p.deskripsi || ''}', ${benchmark}, '${deviceId}')" class="bg-slate-700 hover:bg-slate-600 text-slate-300 font-semibold p-2 rounded-lg text-xs transition-colors">
                  Edit
                </button>
                <button onclick="deletePlant('${id}', '${p.nama}')" class="bg-rose-500/20 hover:bg-rose-500 text-rose-300 hover:text-white font-semibold p-2 rounded-lg text-xs transition-colors">
                  Hapus
                </button>
              </div>
            </div>
          </div>
        `;
      });
      plantGrid.innerHTML = htmlContent;
    }

    // Modal Control
    function openModal(mode, id = '', name = '', desc = '', benchmark = '', deviceId = 'esp32_sensor_01') {
      modalModeInput.value = mode;
      if (mode === 'add') {
        modalTitle.innerText = "Tambah Tanaman Baru";
        plantIdInput.disabled = false;
        plantIdInput.value = '';
        deviceIdInput.value = 'esp32_sensor_01';
        plantNameInput.value = '';
        plantDescInput.value = '';
        plantBenchmarkInput.value = '100000';
      } else {
        modalTitle.innerText = "Edit Tanaman";
        plantIdInput.disabled = true; // Jangan biarkan ID diubah karena referensi sensor
        plantIdInput.value = id;
        deviceIdInput.value = deviceId;
        plantNameInput.value = name;
        plantDescInput.value = desc;
        plantBenchmarkInput.value = benchmark;
      }
      plantModal.classList.remove('hidden');
      setTimeout(() => {
        plantModal.classList.remove('opacity-0');
        plantModal.querySelector('div').classList.remove('scale-95');
      }, 50);
    }

    // Close Modal
    function closeModal() {
      plantModal.classList.add('opacity-0');
      plantModal.querySelector('div').classList.add('scale-95');
      setTimeout(() => {
        plantModal.classList.add('hidden');
      }, 300);
    }

    // Toggle Sensor Switch
    function toggleSensor(id, checked, deviceId) {
      const val = checked ? 1 : 0;
      const updates = {};
      updates[`/tanaman_list/${id}/status_sensor_aktif`] = val;
      
      db.ref().update(updates)
        .then(() => {
          if (checked && deviceId) {
            // Jika diaktifkan, set target_tanaman_id pada device
            return db.ref(`/devices/${deviceId}/target_tanaman_id`).set(id);
          } else if (!checked && deviceId) {
            // Jika dinonaktifkan, periksa apakah device ini masih menargetkan tanaman ini
            return db.ref(`/devices/${deviceId}/target_tanaman_id`).once('value')
              .then((snapshot) => {
                if (snapshot.val() === id) {
                  return db.ref(`/devices/${deviceId}/target_tanaman_id`).set("");
                }
              });
          }
        })
        .catch(err => {
          alert("Gagal mengubah status sensor: " + err.message);
        });
    }

    // Delete Plant
    function deletePlant(id, name) {
      if (confirm(`Apakah Anda yakin ingin menghapus data tanaman "${name}" (${id})?`)) {
        // Dapatkan device_id terlebih dahulu sebelum dihapus
        db.ref(`/tanaman_list/${id}`).once('value').then((snapshot) => {
          const data = snapshot.val() || {};
          const deviceId = data.device_id;
          
          return db.ref(`/tanaman_list/${id}`).remove()
            .then(() => {
              if (deviceId) {
                return db.ref(`/devices/${deviceId}/target_tanaman_id`).once('value').then((snap) => {
                  if (snap.val() === id) {
                    return db.ref(`/devices/${deviceId}/target_tanaman_id`).set("");
                  }
                });
              }
            });
        }).then(() => {
          alert(`Tanaman "${name}" berhasil dihapus.`);
        }).catch(err => {
          alert("Gagal menghapus tanaman: " + err.message);
        });
      }
    }

    // Edit Plant filler
    function editPlant(id, name, desc, benchmark, deviceId) {
      openModal('edit', id, name, desc, benchmark, deviceId);
    }

    // Handle Form Submit (Add / Edit)
    function handleFormSubmit(event) {
      event.preventDefault();
      const mode = modalModeInput.value;
      const id = plantIdInput.value.trim().replace(/[^a-zA-Z0-9_-]/g, ""); // Bersihkan ID dari karakter aneh
      const deviceId = deviceIdInput.value.trim().replace(/[^a-zA-Z0-9_-]/g, "");
      const name = plantNameInput.value.trim();
      const desc = plantDescInput.value.trim();
      const benchmark = parseInt(plantBenchmarkInput.value);

      if (!id) {
        alert("ID Tanaman tidak boleh kosong dan harus alfanumerik!");
        return;
      }
      if (!deviceId) {
        alert("ID Perangkat tidak boleh kosong dan harus alfanumerik!");
        return;
      }

      if (mode === 'add') {
        // Cek dulu apakah ID sudah ada
        db.ref(`/tanaman_list/${id}`).once('value').then((snapshot) => {
          if (snapshot.exists()) {
            alert(`Tanaman dengan ID "${id}" sudah ada di database. Gunakan ID lain.`);
          } else {
            // Save new
            db.ref(`/tanaman_list/${id}`).set({
              nama: name,
              deskripsi: desc,
              benchmark_gas: benchmark,
              device_id: deviceId,
              status_sensor_aktif: 1 // default aktif
            }).then(() => {
              // Set device mapping also because it is active by default
              return db.ref(`/devices/${deviceId}/target_tanaman_id`).set(id);
            }).then(() => {
              closeModal();
            }).catch(err => {
              alert("Gagal menambahkan tanaman: " + err.message);
            });
          }
        });
      } else {
        // Update
        // Dapatkan data tanaman lama terlebih dahulu untuk mengetahui device_id sebelumnya
        db.ref(`/tanaman_list/${id}`).once('value').then((snapshot) => {
          const oldData = snapshot.val() || {};
          const oldDeviceId = oldData.device_id;
          const isActive = oldData.status_sensor_aktif === 1;

          db.ref(`/tanaman_list/${id}`).update({
            nama: name,
            deskripsi: desc,
            benchmark_gas: benchmark,
            device_id: deviceId
          }).then(() => {
            // Jika device_id berubah, bersihkan target_tanaman_id di device yang lama
            const promises = [];
            if (oldDeviceId && oldDeviceId !== deviceId) {
              promises.push(
                db.ref(`/devices/${oldDeviceId}/target_tanaman_id`).once('value').then((snap) => {
                  if (snap.val() === id) {
                    return db.ref(`/devices/${oldDeviceId}/target_tanaman_id`).set("");
                  }
                })
              );
            }
            // Jika sensor dalam keadaan aktif, set target_tanaman_id pada device yang baru
            if (isActive) {
              promises.push(db.ref(`/devices/${deviceId}/target_tanaman_id`).set(id));
            }
            return Promise.all(promises);
          }).then(() => {
            closeModal();
          }).catch(err => {
            alert("Gagal memperbarui tanaman: " + err.message);
          });
        });
      }
    }
  </script>
</body>

</html>
